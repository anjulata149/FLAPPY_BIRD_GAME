<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        * {
    margin: 0;
    padding: 0;
    border: 2px solid white;
    color: white;
}

body {
    background-color: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    border: none;
    padding: 10px;
}

canvas {
    margin: 20px;
    border-radius: 5px;
    background-color: rgba(173, 255, 228, 0.716);
    border: 10px outset white;
    cursor: pointer;
}

.controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
    align-items: center;
}

button {
    height: 50px;
    width: 250px;
    padding: 10px;
    border-radius: 5px;
    background-color: #00ff00;
    color: black;
    font-size: 14px;
    cursor: pointer;
    margin: 0px;
}

#startMenu {
    display: flex;
    position: fixed;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
    align-items: center;
}

.char-btn {
    height: 50px;
    width: 250px;
    padding: 10px;
    border-radius: 5px;
    background-color: #3b3e3b;
    color: rgb(255, 255, 255);
    font-size: 15px;
    cursor: pointer;
    margin: 0px;

}


#up:hover,
#down:hover,
#left:hover,
#right:hover {
    background-color: #00cc00;
}

#up:active,
#down:active,
#left:active,
#right:active {
    background-color: #009900;
}

.nofunction {
    background-color: #121212;
    color: #121212;
    border: none;
}
        
    </style>

<body>
    <h1>Flappy Game</h1>
    <canvas id="canvas" height="500" width="400">
        <div id="startMenu">
            <h2>Select Character</h2>
        </div>




    </canvas>
    <div class="controls">

        <button id="up">up</button>
  


    </div>



    <script >

        const canvas = document.querySelector("#canvas");
const ctx = canvas.getContext('2d');
const upButton = document.querySelector("#up");
const downButton = document.querySelector("#down");
const leftButton = document.querySelector("#left");
const rightButton = document.querySelector("#right");
const charbtns = document.querySelectorAll(".char-btn");


const flapButton = upButton;
if (flapButton) {
    flapButton.innerText = "FLAP";
}
if (downButton) {
    downButton.style.display = "none";
}
if (leftButton) {
    leftButton.style.display = "none";
}
if (rightButton) {
    rightButton.style.display = "none";
}

let score = 0;
let pipearray = [];
let gameOver = false;
let gameStarted = false;
let characterChoice;
let playerName = "";

function getMenuElements() {
    return document.querySelectorAll(".char-btn, .menu, #menu, .selection, #selection");
}

function hideMenu() {
    getMenuElements().forEach(el => el.style.display = "none");
}

function showMenu() {
    getMenuElements().forEach(el => {
        if (el.tagName === "BUTTON" || el.tagName === "A" || el.tagName === "INPUT") {
            el.style.display = "inline-block";
        } else {
            el.style.display = "block";
        }
    });
}

function requestPlayerName() {
    if (playerName) {
        return;
    }

    while (!playerName) {
        playerName = prompt("Enter your name to start the game:");
        if (playerName) {
            playerName = playerName.trim();
        }
        if (!playerName) {
            alert("Name is required to play.");
        }
    }
}

function initializeGame() {
    requestPlayerName();
    showMenu();
}

window.addEventListener("load", initializeGame);

function startGame() {
    requestPlayerName();
    if (!playerName) {
        return;
    }
    characterChoice = localStorage.getItem("characterChoice") || characterChoice || "bird";
    gameStarted = true;
    gameOver = false;
    score = 0;
    pipearray = [];
    bird.x = 50;
    bird.y = 50;
    velocityY = 0;
    hideMenu();
}

const gravity = 0.6;
const speed = 2;
let velocityY = 0;


const bird = {
    x: 50,
    y: 50,
    height: 20,
    width: 20,
}
const obstacle = {
    x: canvas.width,
    y: 0,
    width: 100,
    height: 400
};



const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
gradient.addColorStop(0, "red");
gradient.addColorStop(1, "yellow");

const topPipeImage = new Image();
topPipeImage.src = "top.png"; // Replace with the correct image path for your top pillar texture
topPipeImage.onerror = () => {
    console.warn("Top pipe image failed to load. Using plain color pipes.");
};

const bottomPipeImage = new Image();
bottomPipeImage.src = "bottom.png"; // Replace with the correct image path for your bottom pillar texture
bottomPipeImage.onerror = () => {
    console.warn("Bottom pipe image failed to load. Using plain color pipes.");
};

const backgroundImage1 = new Image();
backgroundImage1.src = "background_1.png"; // Replace with the correct image path for your background image
backgroundImage1.onerror = () => {
    console.warn("Background image failed to load. Using plain colored background.");
};
const backgroundImage2 = new Image();
backgroundImage2.src = "background_2.png"; // Replace with the correct image path for your background image
backgroundImage2.onerror = () => {
    console.warn("Background image failed to load. Using plain colored background.");
};
let up = (() => {
    bird.y -= bird.height * 6;
    drawBird()

})

function choiceofbird() {
    ctx.fillStyle = "#25251f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#25251fae";
    ctx.fillRect(canvas.width / 2 - 80, canvas.height / 5, canvas.width / 2, canvas.height / 5 + 40);
    ctx.font = "30px Arial";
    ctx.fillStyle = "white";
    ctx.lineWidth = 2;
    ctx.fillText("❤️", canvas.width / 2 - 80, canvas.height / 5);

    ctx.fillStyle = "#25251fae";
    ctx.fillRect(canvas.width / 2 - 80, canvas.height / 5 + 35, canvas.width / 2, canvas.height / 5 + 40);
    ctx.font = "30px Arial";
    ctx.fillStyle = "white";
    ctx.lineWidth = 2;
    ctx.fillText("😎", canvas.width / 2 - 80, canvas.height / 5 + 37.5);

    ctx.fillStyle = "#25251fae";
    ctx.fillRect(canvas.width / 2 - 80, canvas.height / 5 + 70, canvas.width / 2, canvas.height / 5 + 40);
    ctx.font = "30px Arial";
    ctx.fillStyle = "white";
    ctx.lineWidth = 2;
    ctx.fillText("🤡", canvas.width / 2 - 80, canvas.height / 5 + 72.5);



}

function drawBird() {
    ctx.font = "30px Arial";
    ctx.fillStyle = "black";
    if (characterChoice === "bird") {
        ctx.fillText("🐦‍🔥", bird.x, bird.y + 20);
    }
    if (characterChoice === "car") {
        ctx.fillText("�", bird.x, bird.y + 20);
    }
    if (characterChoice === "plane") {
        ctx.fillText("✈️", bird.x, bird.y + 20);
    }
    if (characterChoice === "poop") {
        ctx.fillText("💩", bird.x, bird.y + 20);
    }
    if (characterChoice === "ghost") {
        ctx.fillText("🤡", bird.x, bird.y + 20);
    }
}
function drawscore() {
    ctx.font = "30px Arial";
    ctx.fillStyle = "black";
    ctx.fillText(score, canvas.width / 2 - 15, 80);
}
function gameoverscreen() {

    if (backgroundImage2.complete && backgroundImage2.naturalWidth !== 0) {
        ctx.drawImage(backgroundImage2, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#edff63";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }



    ctx.fillStyle = gradient;
    ctx.fillRect(10, canvas.height / 10, (canvas.height * 4 / 5) - 20, canvas.width * 3 / 5);


    ctx.font = "30px Arial";
    ctx.fillStyle = "black";
    ctx.fillText("Game Over", canvas.width / 2 - 80, canvas.height / 5);

    ctx.strokeStyle = "white";

    ctx.font = "30px sans-serif";
    ctx.lineWidth = 2;

    ctx.strokeText("Press spacebar/tap", canvas.width / 2 - 120, canvas.height / 4 + 20);
    ctx.strokeText(" to restart", canvas.width / 2 - 60, (canvas.height / 4) + 50);
    ctx.fillStyle = "black";
    ctx.fillText("Press spacebar/tap", canvas.width / 2 - 120, canvas.height / 4 + 20);
    ctx.fillText(" to restart", canvas.width / 2 - 60, (canvas.height / 4) + 50);


    ctx.fillText("score: " + score, canvas.width / 2 - 54, 2.2 * canvas.height / 5);
    bestscore();


}
function bestscore() {
    let bestscore = localStorage.getItem("bestscore") || 0;
    if (score > bestscore) {
        bestscore = score;
        localStorage.setItem("bestscore", bestscore);
    }
    ctx.fillStyle = "black";
    ctx.font = "25px sans-serif";
    ctx.fillText("BEST: " + bestscore, canvas.width / 30, 30);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 1.3;
    ctx.strokeText("BEST: " + bestscore, canvas.width / 30, 30);

}



if (flapButton) {
    flapButton.addEventListener("click", movebird);
}
canvas.addEventListener("mousedown", movebird);
canvas.addEventListener("touchstart", (event) => {
    movebird();
    event.preventDefault();
}, { passive: false });

window.addEventListener("keydown", (event) => {
    if (event.code === "Space" || event.key.toLowerCase() === "w") {
        movebird();
    }
});


requestAnimationFrame(update);
setInterval(placepipes, 1800);

function movebird() {
    if (!gameStarted) {
        startGame();
    }

    velocityY = -10;
    if (gameOver) {
        bird.y = 50;
        bird.x = 50;
        score = 0;
        pipearray = [];
        gameOver = false;
        gameStarted = true;
        hideMenu();
    }
}
function selectCharacter(character) {
    localStorage.setItem("characterChoice", character);
    characterChoice = character;
    // update button selection state
    charbtns.forEach(btn => {
        btn.classList.remove("selected");
    });
    document.querySelector(`.char-btn[data-character="${character}"]`).classList.add("selected");
    startGame();
}

function collisionDetection(a, b) {
    return (a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y);
}

function placepipes() {
    if (gameOver) {
        return;
    }
    let topPipe = {
        x: canvas.width,
        y: 0,
        width: 80,
        height: canvas.height * Math.random() * 0.5 + 50,
        passed: false,
        type: "top",
    };
    pipearray.push(topPipe);
    let bottomPipe = {
        x: canvas.width,
        y: topPipe.height + 150,
        width: 80,
        height: canvas.height - topPipe.height - 150,
        passed: false,
        type: "bottom",
    };
    pipearray.push(bottomPipe);


}

function DataOUT(playerName, playerScore) {


    // Replace with your actual Web App URL from Step 3
    const url = "https://script.google.com/macros/s/AKfycbyn0ufhlN2PKEvtsd4R1ntdnjfMueIXUwgEZQyFcZdcYytd4R_Ex3WHbZhOKJNK417cjg/exec";

    const data = {
        name: playerName,
        score: playerScore
    };

    // Send the data using a POST request
    fetch(url, {
        method: "POST",
        mode: "no-cors", // Required to bypass CORS restrictions with Google Scripts
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })

        .then(() => {
            console.log("Score successfully sent to Google Sheets!");
        })
        .catch((error) => {
            console.error("Error sending score:", error);
        });


    




}

function update() {
    requestAnimationFrame(update);

    if (!gameStarted) {
        return;
    }

    if (bird.y + bird.height > canvas.height) {
        gameOver = true;
    }
    if (gameOver) {
        
    
        DataOUT(localStorage.getItem("playerName"), score);
        gameoverscreen();
        showMenu();
        gameStarted = false;
        return;
    }

    void ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (backgroundImage1.complete && backgroundImage1.naturalWidth !== 0) {
        ctx.drawImage(backgroundImage1, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#87ceeb";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    velocityY += gravity;

    bird.y = Math.max(0, bird.y + velocityY);




    drawBird();

    for (i = 0; i < pipearray.length; i++) {
        pipe = pipearray[i];

        pipe.x -= speed;

        ctx.lineWidth = 4;
        const pipeImg = pipe.type === "bottom" ? bottomPipeImage : topPipeImage;
        if (pipeImg.complete && pipeImg.naturalWidth !== 0) {
            ctx.drawImage(pipeImg, pipe.x, pipe.y, pipe.width, pipe.height);
        } else {
            ctx.fillStyle = "green";
            ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
        }

        if (pipe.x + pipe.width < bird.x && !pipe.passed) {
            score += 1 / 2;
            pipe.passed = true;

        }



        if (collisionDetection(bird, pipe)) {
            gameOver = true;
        }
    }
    while (pipearray.length > 0 && pipearray[0].x + pipearray[0].width < 0) {
        pipearray.shift();
    }
    drawscore();
    bestscore();




}












    </script>
</body>

</html>
